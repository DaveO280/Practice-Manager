<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Clients</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Import Clients from JSON Backup</h2>
        <p>Select your clients backup JSON file to import all clients into the application.</p>
        
        <input type="file" id="fileInput" accept=".json" style="margin: 10px 0;">
        <br>
        <button onclick="importClients()">Import Clients</button>
        
        <div id="status"></div>
    </div>

    <script>
        // This script uses the browser's IndexedDB to import clients
        // It mimics the same structure used by the PracticeManager app
        
        const DB_NAME = 'PracticeManagerDB';
        const DB_VERSION = 1;
        const CLIENT_STORE = 'clients';
        
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(CLIENT_STORE)) {
                        db.createObjectStore(CLIENT_STORE, { keyPath: 'id' });
                    }
                };
            });
        }
        
        async function saveClient(db, client) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([CLIENT_STORE], 'readwrite');
                const store = transaction.objectStore(CLIENT_STORE);
                const request = store.put(client);
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        async function getAllClients(db) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([CLIENT_STORE], 'readonly');
                const store = transaction.objectStore(CLIENT_STORE);
                const request = store.getAll();
                
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        async function importClients() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                statusDiv.className = 'error';
                statusDiv.textContent = 'Please select a JSON file first.';
                return;
            }
            
            const file = fileInput.files[0];
            
            try {
                statusDiv.className = '';
                statusDiv.textContent = 'Reading file...';
                
                const text = await file.text();
                const importData = JSON.parse(text);
                
                if (!importData.clients || !Array.isArray(importData.clients)) {
                    throw new Error('Invalid file format. Expected a JSON object with a "clients" array.');
                }
                
                statusDiv.textContent = 'Opening database...';
                const db = await openDB();
                
                statusDiv.textContent = 'Getting existing clients...';
                const existingClients = await getAllClients(db);
                
                let importedCount = 0;
                let updatedCount = 0;
                let skippedCount = 0;
                
                statusDiv.textContent = `Importing ${importData.clients.length} clients...`;
                
                for (const clientData of importData.clients) {
                    if (!clientData.name) {
                        skippedCount++;
                        continue;
                    }
                    
                    const clientToSave = {
                        id: clientData.id || `client-${Date.now()}-${Math.random()}`,
                        name: clientData.name,
                        rate: clientData.rate || 0,
                        email: clientData.email || '',
                        billingType: clientData.billingType || 'direct',
                        active: clientData.active !== undefined ? clientData.active : true,
                        timePatterns: clientData.timePatterns || [],
                        sessionCount: clientData.sessionCount || 0,
                        lastSeen: clientData.lastSeen || null,
                        dateOfBirth: clientData.dateOfBirth || null,
                        diagnosis: clientData.diagnosis || ''
                    };
                    
                    const exists = existingClients.find(c => c.id === clientToSave.id);
                    if (exists) {
                        updatedCount++;
                    } else {
                        importedCount++;
                    }
                    
                    await saveClient(db, clientToSave);
                }
                
                statusDiv.className = 'success';
                statusDiv.innerHTML = `
                    <strong>Import Complete!</strong><br>
                    ✓ ${importedCount} new client(s) added<br>
                    ✓ ${updatedCount} existing client(s) updated<br>
                    ${skippedCount > 0 ? `⚠ ${skippedCount} client(s) skipped (missing name)` : ''}
                    <br><br>
                    <strong>Refresh your Practice Manager app to see the imported clients.</strong>
                `;
                
            } catch (error) {
                console.error('Import error:', error);
                statusDiv.className = 'error';
                statusDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
